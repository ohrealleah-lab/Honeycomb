name: Build and Publish Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup Velopack
      run: dotnet tool install -g vpk

    - name: Publish App
      working-directory: windows/src/SoliBee.Desktop
      run: dotnet publish -c Release -r win-x64 --self-contained -o publish-dir

    - name: Pack with Velopack
      working-directory: windows/src/SoliBee.Desktop
      run: vpk pack -u Honeycomb -v ${{ github.ref_name }} -p publish-dir -e Honeycomb.exe -i Assets/AppIcon.ico -o releases

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-releases
        path: windows/src/SoliBee.Desktop/releases/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: windows/src/SoliBee.Desktop/releases/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
